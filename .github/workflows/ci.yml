name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  qualidade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run lint
